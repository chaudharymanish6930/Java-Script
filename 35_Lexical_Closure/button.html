    function ClickHandler(color){
        // document.body.style.backgroundColor=`${color}`
        return function(){
            document.body.style.backgroundColor=`${color}`

    }
    document.getElementById('orange').onclick =ClickHandler("Green")
    document.getElementById('Green').onclick =ClickHandler("orange")
</script>
